##### Core behavior
set -g mode-keys vi
set -g history-limit 100000
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB,alacritty:RGB,kitty:RGB"
set -g mouse on
set -g focus-events on
set -s set-clipboard on

# Reload config quickly.
bind r source-file ~/.tmux.conf \; display-message "Reloaded tmux config."

# Use 1-based numbering for windows and panes.
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Make ESC responsive in vim/neovim.
set -sg escape-time 0

# Toggle synchronized panes with status feedback.
bind C-s if -F '#{pane_synchronized}' \
  "setw synchronize-panes off; display-message 'Sync panes: OFF'" \
  "setw synchronize-panes on; display-message 'Sync panes: ON'"

# Toggle piping pane output to ~/window-name.log.
bind P pipe-pane -o "cat >>~/#W.log" \; display-message "Toggled logging to ~/#W.log"

##### Pane and window movement
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

unbind p
unbind n
bind -r n next-window
bind -r N previous-window

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Copy mode + clipboard
bind Escape copy-mode
bind p paste-buffer
bind -T copy-mode-vi Space send -X halfpage-down
bind -T copy-mode-vi BSpace send -X halfpage-up
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

# Prefer native clipboard tools if present.
if-shell "command -v pbcopy >/dev/null 2>&1" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'; \
   bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy'; \
   bind C-c run-shell 'tmux save-buffer - | pbcopy'; \
   bind C-v run-shell 'tmux set-buffer -- \"$(pbpaste)\"; tmux paste-buffer'"

if-shell "command -v wl-copy >/dev/null 2>&1 && command -v wl-paste >/dev/null 2>&1" \
  "bind C-c run-shell 'tmux save-buffer - | wl-copy'; \
   bind C-v run-shell 'tmux set-buffer -- \"$(wl-paste -n)\"; tmux paste-buffer'"

if-shell "command -v xclip >/dev/null 2>&1" \
  "bind C-c run-shell 'tmux save-buffer - | xclip -i -selection clipboard'; \
   bind C-v run-shell 'tmux set-buffer -- \"$(xclip -o -selection clipboard)\"; tmux paste-buffer'"

##### Status line
set -g status-style "#{?pane_synchronized,fg=black,bg=yellow,fg=white,bg=black}"
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]Window: #I #[fg=cyan]Pane: #P #{?pane_synchronized,#[fg=black]#[bg=yellow] SYNC #[default],} "
set -g status-justify centre
set -g status-interval 5
set -g monitor-activity on
set -g visual-activity on

##### Colors
set -g window-status-current-style fg=black,bg=green,bright
set -g window-status-style fg=red,bg=default,dim
set -g pane-border-style fg=red,bg=black
set -g pane-active-border-style fg=green,bg=black
set -g message-style fg=white,bg=black,bright
